<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time Travel Agency</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="logo">Time Travel Agency</div>
      <nav>
        <a href="#">Home</a>
        <a href="#">Tours</a>
        <a href="#">About us</a>
        <a href="#">Contact us</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>Explore the Past & Future</h1>
      </section>

      <section class="services">
        <h2>Our Services</h2>
        <div class="services-container">
          <div class="service-card">Ancient Rome</div>
          <div class="service-card">Victorian London</div>
          <div class="service-card">Year 3000</div>
          <div class="service-card">Year 1000</div>
        </div>
      </section>

      <section class="gallery">
        <h2>Time Travel Gallery</h2>
        <div class="grid-container">
          <img src="https://picsum.photos/300/200?random=1" alt="Time Travel" />
          <img src="https://picsum.photos/300/200?random=2" alt="Time Travel" />
          <img src="https://picsum.photos/300/200?random=3" alt="Time Travel" />
          <img src="https://picsum.photos/300/200?random=4" alt="Time Travel" />
          <img src="https://picsum.photos/300/200?random=5" alt="Time Travel" />
          <img src="https://picsum.photos/300/200?random=6" alt="Time Travel" />
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Time Travel Agency</p>
      <p>All rights reserved</p>
    </footer>
  </body>
</html>
